services:
  postgres:
    image: postgres:16-alpine
    container_name: usc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: usc
      POSTGRES_PASSWORD: usc123
      POSTGRES_DB: usc_db
    ports:
      - "5432:5432"
    volumes:
      - usc_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usc -d usc_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: usc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - usc_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend_fastapi
    container_name: usc-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://usc:usc123@postgres:5432/usc_db
      REDIS_URL: redis://redis:6379/0
      REDIS_PREFIX: usc
      REDIS_TIMEOUT_SECONDS: 1.5
      API_PREFIX: /api
      JWT_SECRET_KEY: change-me
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRES_MINUTES: 60
      REFRESH_TOKEN_EXPIRES_DAYS: 30
      CACHE_TTL_ANALYTICS_SUMMARY: 45
      CACHE_TTL_ANALYTICS_INSIGHTS: 120
      CACHE_TTL_ANALYTICS_ASSISTANT: 45
      CACHE_TTL_CATEGORIES: 180
      CACHE_TTL_PRODUCTS: 45
      CACHE_TTL_SUPPLIERS: 60
      EMAIL_CODE_EXPIRES_SECONDS: 300
      EMAIL_CODE_LENGTH: 6
      EMAIL_CODE_DEV_FALLBACK: "true"
    ports:
      - "8000:8000"
    working_dir: /app
    volumes:
      - ./backend_fastapi:/app
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
    container_name: usc-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      VITE_API_BASE: /api
    ports:
      - "5173:5173"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npm install && npm run dev -- --host=0.0.0.0 --port=5173 --strictPort"

volumes:
  usc_pg_data:
  usc_redis_data:
